<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Bloqueado</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 32px;
      text-align: center;
    }
    h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.5px; }
    .site  { font-size: 13px; color: #6b7280; }
    .next  { font-size: 15px; color: #9ca3af; margin-top: 4px; }
    .windows { font-size: 12px; color: #374151; margin-top: 20px; line-height: 1.8; }
    .btn {
      margin-top: 24px;
      padding: 10px 28px;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 8px;
      color: #9ca3af;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: #374151; }
    .error { color: #f87171; font-size: 13px; margin-top: 8px; min-height: 18px; }
  </style>
</head>
<body>
  <h1>Bloqueado</h1>
  <div class="site" id="site"></div>
  <div class="next" id="next"></div>
  <div class="windows" id="windows"></div>
  <a href="javascript:void(0)" class="btn" id="retry">Verificar novamente</a>
  <div class="error" id="error"></div>

  <script>
    const DEFAULT = {
      window1_start: '12:30', window1_end: '13:00',
      window2_start: '20:15', window2_end: '20:45',
    };

    const params    = new URLSearchParams(location.search);
    const returnUrl = params.get('return') || '';

    try {
      const url = new URL(returnUrl);
      document.getElementById('site').textContent = url.hostname;
    } catch (e) {}

    function parseTime(t) {
      const [h, m] = t.split(':').map(Number);
      return h * 60 + m;
    }

    function minNow() {
      const d = new Date();
      return d.getHours() * 60 + d.getMinutes();
    }

    chrome.storage.local.get(DEFAULT, (s) => {
      const windows = [
        { start: parseTime(s.window1_start), end: parseTime(s.window1_end), label: s.window1_start },
        { start: parseTime(s.window2_start), end: parseTime(s.window2_end), label: s.window2_start },
      ];

      document.getElementById('windows').innerHTML =
        'Janela 1: ' + s.window1_start + ' – ' + s.window1_end + '<br>' +
        'Janela 2: ' + s.window2_start + ' – ' + s.window2_end;

      function inWindow() {
        const m = minNow();
        return windows.some(w => m >= w.start && m < w.end);
      }

      function updateNext() {
        const m        = minNow();
        const upcoming = windows.filter(w => w.start > m);
        const next     = upcoming.length > 0 ? upcoming[0] : windows[0];
        const diff     = next.start > m ? next.start - m : (24 * 60 - m + next.start);
        const h        = Math.floor(diff / 60);
        const min      = diff % 60;
        document.getElementById('next').textContent =
          'Próxima janela: ' + next.label + ' — em ' + (h > 0 ? h + 'h ' : '') + min + 'min';
      }

      updateNext();
      setInterval(updateNext, 30000);

      document.getElementById('retry').addEventListener('click', () => {
        if (inWindow() && returnUrl) {
          window.location.href = returnUrl;
        } else {
          updateNext();
          document.getElementById('error').textContent = 'Ainda fora da janela.';
          setTimeout(() => { document.getElementById('error').textContent = ''; }, 2000);
        }
      });
    });
  </script>
</body>
</html>
