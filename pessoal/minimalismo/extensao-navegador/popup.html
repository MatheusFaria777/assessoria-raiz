<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 250px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
    }
    .label {
      font-size: 10px;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 8px;
    }
    .status { font-size: 17px; font-weight: 600; }
    .status.open    { color: #4ade80; }
    .status.blocked { color: #f87171; }
    .status.free    { color: #60a5fa; }
    .info { font-size: 12px; color: #6b7280; margin-top: 4px; line-height: 1.4; }
    .divider { border: none; border-top: 1px solid #1f2937; margin: 14px 0; }

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
    }
    .toggle-name { font-size: 12px; color: #9ca3af; }
    .switch { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #374151;
      border-radius: 18px;
      cursor: pointer;
      transition: background .15s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 12px; height: 12px;
      left: 3px; top: 3px;
      background: #6b7280;
      border-radius: 50%;
      transition: transform .15s, background .15s;
    }
    input:checked + .slider { background: #065f46; }
    input:checked + .slider::before { transform: translateX(14px); background: #4ade80; }

    .window-rows { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .window-row { display: flex; align-items: center; gap: 6px; }
    .window-idx { font-size: 11px; color: #4b5563; width: 16px; }
    .sep { font-size: 11px; color: #4b5563; }
    input[type="time"] {
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 4px;
      color: #9ca3af;
      font-size: 12px;
      padding: 3px 5px;
      width: 78px;
      text-align: center;
    }
    input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(0.4); cursor: pointer; }
    input[type="time"]:disabled { opacity: 0.35; cursor: not-allowed; }

    .site-name {
      font-size: 11px;
      color: #6b7280;
      font-weight: 600;
      margin-top: 10px;
      margin-bottom: 5px;
    }
    .site-name:first-of-type { margin-top: 0; }
  </style>
</head>
<body>
  <div class="label">Agora</div>
  <div class="status" id="status"></div>
  <div class="info" id="info"></div>

  <hr class="divider">
  <div class="label">Bloqueio</div>
  <div class="toggle-row">
    <span class="toggle-name">Bloquear por horário</span>
    <label class="switch"><input type="checkbox" id="blocking_enabled"><span class="slider"></span></label>
  </div>
  <div class="window-rows" id="window-rows">
    <div class="window-row">
      <span class="window-idx">1</span>
      <input type="time" id="window1_start">
      <span class="sep">–</span>
      <input type="time" id="window1_end">
    </div>
    <div class="window-row">
      <span class="window-idx">2</span>
      <input type="time" id="window2_start">
      <span class="sep">–</span>
      <input type="time" id="window2_end">
    </div>
  </div>

  <hr class="divider">
  <div class="label">O que esconder</div>

  <div class="site-name">Instagram</div>
  <div class="toggle-row">
    <span class="toggle-name">Stories</span>
    <label class="switch"><input type="checkbox" id="instagram_stories"><span class="slider"></span></label>
  </div>
  <div class="toggle-row">
    <span class="toggle-name">Feed</span>
    <label class="switch"><input type="checkbox" id="instagram_feed"><span class="slider"></span></label>
  </div>
  <div class="toggle-row">
    <span class="toggle-name">Reels</span>
    <label class="switch"><input type="checkbox" id="instagram_reels"><span class="slider"></span></label>
  </div>

  <div class="site-name">YouTube</div>
  <div class="toggle-row">
    <span class="toggle-name">Feed da home</span>
    <label class="switch"><input type="checkbox" id="youtube_feed"><span class="slider"></span></label>
  </div>
  <div class="toggle-row">
    <span class="toggle-name">Shorts</span>
    <label class="switch"><input type="checkbox" id="youtube_shorts"><span class="slider"></span></label>
  </div>

  <div class="site-name">Facebook</div>
  <div class="toggle-row">
    <span class="toggle-name">Feed + Stories</span>
    <label class="switch"><input type="checkbox" id="facebook_feed"><span class="slider"></span></label>
  </div>
  <div class="toggle-row">
    <span class="toggle-name">Reels</span>
    <label class="switch"><input type="checkbox" id="facebook_reels"><span class="slider"></span></label>
  </div>
  <div class="toggle-row">
    <span class="toggle-name">Marketplace</span>
    <label class="switch"><input type="checkbox" id="facebook_marketplace"><span class="slider"></span></label>
  </div>

  <script src="popup.js"></script>
</body>
</html>
