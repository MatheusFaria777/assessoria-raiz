<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #13161E;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
    }
    .slide-num {
      position: absolute;
      top: 52px;
      right: 72px;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 300;
      color: #7A8499;
    }
    .tag {
      display: inline-block;
      background: #3e636f;
      color: #EDF0F7;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 8px 18px;
      margin-bottom: 52px;
    }
    .main-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 50px;
      font-weight: 600;
      color: #EDF0F7;
      line-height: 1.2;
      margin-bottom: 8px;
    }
    .main-text .word {
      font-family: 'Playfair Display', serif;
      font-size: 60px;
      font-weight: 700;
      font-style: italic;
      color: #4d7a87;
    }
    .divider {
      width: 100%;
      height: 1px;
      background: rgba(237, 240, 247, 0.08);
      margin: 44px 0;
    }
    .sub-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 34px;
      font-weight: 300;
      color: rgba(237, 240, 247, 0.65);
      line-height: 1.6;
      margin-bottom: 40px;
    }
    .close-line {
      font-family: 'DM Sans', sans-serif;
      font-size: 30px;
      font-weight: 500;
      color: #EDF0F7;
      line-height: 1.4;
      border-left: 3px solid #3e636f;
      padding-left: 24px;
    }
    .bottom-note {
      position: absolute;
      bottom: 52px;
      left: 80px;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      color: #7A8499;
    }
  </style>
</head>
<body>
  <div class="slide-num">05</div>
  <div class="tag">Cuidado</div>

  <div class="main-text">
    A <span class="word">inveja</span> tira<br>
    o foco do propósito<br>
    e coloca você num<br>
    beco sem saída.
  </div>

  <div class="divider"></div>

  <div class="sub-text">
    Você perde o foco<br>
    e a alegria ao mesmo tempo.
  </div>

  <div class="close-line">
    Termine a sua corrida.<br>
    Sem olhar pro corredor do lado.
  </div>

  <div class="bottom-note">@omatheusfariaa · Uma Vida com Propósitos</div>
</body>
</html>
