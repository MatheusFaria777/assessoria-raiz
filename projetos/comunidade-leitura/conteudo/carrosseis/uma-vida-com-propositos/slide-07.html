<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #4d7a87;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
    }
    .slide-num {
      position: absolute;
      top: 52px;
      right: 72px;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 300;
      color: rgba(237, 240, 247, 0.4);
    }
    .label {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(237, 240, 247, 0.55);
      margin-bottom: 52px;
    }
    .main {
      font-family: 'DM Sans', sans-serif;
      font-size: 36px;
      font-weight: 300;
      color: rgba(237, 240, 247, 0.85);
      line-height: 1.65;
      margin-bottom: 60px;
    }
    .main strong {
      font-weight: 500;
      color: #EDF0F7;
    }
    .cta-box {
      background: rgba(10, 12, 16, 0.25);
      padding: 36px 40px;
    }
    .cta-text {
      font-family: 'Playfair Display', serif;
      font-size: 54px;
      font-weight: 700;
      font-style: italic;
      color: #EDF0F7;
      line-height: 1.1;
    }
    .handle {
      position: absolute;
      bottom: 52px;
      left: 80px;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 2px;
      color: rgba(237, 240, 247, 0.5);
    }
  </style>
</head>
<body>
  <div class="slide-num">07</div>
  <div class="label">Leitura com Propósito</div>

  <div class="main">
    Tô construindo um espaço<br>
    pra quem quer <strong>ler com propósito</strong>,<br>
    não pra parecer inteligente,<br>
    mas pra mudar de fato.
  </div>

  <div class="cta-box">
    <div class="cta-text">Me segue<br>pra acompanhar.</div>
  </div>

  <div class="handle">@omatheusfariaa</div>
</body>
</html>
