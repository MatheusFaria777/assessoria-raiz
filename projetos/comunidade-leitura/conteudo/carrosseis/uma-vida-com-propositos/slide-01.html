<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #EDF0F7;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
    }
    .slide-num {
      position: absolute;
      top: 52px;
      right: 72px;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 300;
      color: rgba(10, 12, 16, 0.25);
    }
    .eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #3e636f;
      margin-bottom: 44px;
    }
    .main-quote {
      font-family: 'Playfair Display', serif;
      font-size: 90px;
      font-weight: 600;
      font-style: italic;
      color: #0A0C10;
      line-height: 1.05;
      margin-bottom: 56px;
    }
    .main-quote .highlight {
      color: #3e636f;
    }
    .accent-bar {
      width: 60px;
      height: 3px;
      background: #3e636f;
      margin-bottom: 36px;
    }
    .book-ref {
      font-family: 'DM Sans', sans-serif;
      font-size: 20px;
      font-weight: 300;
      color: rgba(10, 12, 16, 0.45);
    }
    .book-ref strong {
      font-weight: 500;
      color: #3e636f;
    }
    .handle {
      position: absolute;
      bottom: 52px;
      left: 80px;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 2px;
      color: rgba(10, 12, 16, 0.3);
    }
  </style>
</head>
<body>
  <div class="slide-num">01</div>
  <div class="eyebrow">Uma Vida com Propósitos</div>
  <div class="main-quote">
    Você não vai<br>
    encontrar o seu<br>
    <span class="highlight">propósito</span> olhando<br>
    para si mesmo.
  </div>
  <div class="accent-bar"></div>
  <div class="book-ref">Baseado no livro de <strong>Rick Warren</strong></div>
  <div class="handle">@omatheusfariaa</div>
</body>
</html>
