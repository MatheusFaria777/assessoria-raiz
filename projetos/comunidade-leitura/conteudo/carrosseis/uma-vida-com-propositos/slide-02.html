<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 1080px;
      height: 1350px;
      overflow: hidden;
      background: #3e636f;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
    }
    .slide-num {
      position: absolute;
      top: 52px;
      right: 72px;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 300;
      color: #7A8499;
    }
    .intro {
      font-family: 'DM Sans', sans-serif;
      font-size: 32px;
      font-weight: 300;
      color: rgba(237, 240, 247, 0.75);
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .question {
      font-family: 'Playfair Display', serif;
      font-size: 52px;
      font-weight: 600;
      font-style: italic;
      color: #EDF0F7;
      line-height: 1.1;
      margin-bottom: 40px;
      background: rgba(10, 12, 16, 0.2);
      padding: 20px 28px;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 44px;
    }
    .list-item {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .dot {
      width: 6px;
      height: 6px;
      background: rgba(237, 240, 247, 0.5);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .list-item span {
      font-family: 'DM Sans', sans-serif;
      font-size: 32px;
      font-weight: 300;
      color: rgba(237, 240, 247, 0.8);
      line-height: 1.4;
    }
    .punchline {
      font-family: 'DM Sans', sans-serif;
      font-size: 38px;
      font-weight: 600;
      color: #EDF0F7;
      border-left: 3px solid rgba(237, 240, 247, 0.5);
      padding-left: 24px;
    }
    .bottom-note {
      position: absolute;
      bottom: 52px;
      left: 80px;
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      color: rgba(237, 240, 247, 0.45);
    }
  </style>
</head>
<body>
  <div class="slide-num">02</div>

  <div class="intro">Pra encontrar a resposta de</div>
  <div class="question">"Qual é o meu propósito?"</div>

  <div class="intro" style="margin-bottom: 20px;">você não vai conseguir descobrir olhando em:</div>

  <div class="list">
    <div class="list-item"><div class="dot"></div><span>no que você é bom</span></div>
    <div class="list-item"><div class="dot"></div><span>no que te traz felicidade</span></div>
    <div class="list-item"><div class="dot"></div><span>como você pode mudar o mundo</span></div>
  </div>

  <div class="punchline">Essa é a pergunta errada.</div>

  <div class="bottom-note">@omatheusfariaa · Uma Vida com Propósitos</div>
</body>
</html>
