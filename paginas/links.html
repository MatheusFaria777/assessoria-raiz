    /* ── RESET ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── BASE (mobile-first) ── */
    body {
      background-color: #0A0C10;
      color: #EDF0F7;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      line-height: 1.5;
      min-height: 100vh;
      padding: 40px 20px 48px;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 390px;
      animation: fadeUp 0.55s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .avatar {
      display: block;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #3e636f;
      margin: 0 auto 14px;
    }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 600;
      color: #EDF0F7;
      letter-spacing: -0.4px;
      line-height: 1.1;
      margin-bottom: 5px;
    }

    .handle {
      font-size: 11px;
      font-weight: 300;
      color: #7A8499;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 24px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(237, 240, 247, 0.08);
    }

    .divider-mark {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #3e636f;
      flex-shrink: 0;
    }

    /* ── LINKS ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    /* WhatsApp — destaque */
    .link-featured {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: #3e636f;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .link-featured:hover,
    .link-featured:focus {
      background: #4d7a87;
      transform: translateX(3px);
      outline: none;
    }

    .link-featured:active {
      background: #2D5EBF;
      transform: translateX(1px);
    }

    .link-featured .link-label {
      font-size: 10px;
      font-weight: 500;
      color: rgba(237, 240, 247, 0.7);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .link-featured .link-desc {
      font-size: 13px;
      font-weight: 400;
      color: #EDF0F7;
    }

    /* Links normais */
    .link-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: #13161E;
      border-left: 2px solid #3e636f;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .link-item:hover,
    .link-item:focus {
      background: #1E2330;
      transform: translateX(3px);
      outline: none;
    }

    .link-item:active {
      background: #252B3B;
      transform: translateX(1px);
    }

    .link-item .link-label {
      font-size: 10px;
      font-weight: 500;
      color: #7A8499;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .link-item .link-desc {
      font-size: 13px;
      font-weight: 300;
      color: #EDF0F7;
      font-style: italic;
    }

    .icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      fill: #EDF0F7;
      opacity: 0.85;
    }

    .link-featured .icon { opacity: 1; }

    .link-text { flex: 1; min-width: 0; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 36px;
      text-align: center;
    }

    .footer-text {
      font-size: 10px;
      font-weight: 300;
      color: rgba(122, 132, 153, 0.35);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* ── TABLET+ ── */
    @media (min-width: 480px) {
      body { padding: 56px 24px 64px; }
      .name { font-size: 36px; }
      .avatar { width: 92px; height: 92px; }
    }
