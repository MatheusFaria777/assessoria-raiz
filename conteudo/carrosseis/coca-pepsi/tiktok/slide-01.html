<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1920px;
  overflow: hidden;
  position: relative;
  background: #0a0a0a;
  font-family: 'Inter', sans-serif;
}
.bg {
  position: absolute;
  inset: 0;
  background: url('../imagens/slide-01-capa.jpg') center 38% / cover no-repeat;
}
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg,
    rgba(0,0,0,0.04) 0%,
    rgba(0,0,0,0.12) 30%,
    rgba(0,0,0,0.60) 58%,
    rgba(0,0,0,0.94) 100%
  );
}
.content {
  position: relative;
  z-index: 10;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding: 0 80px 148px;
}
.tag {
  font-family: 'Inter', sans-serif;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 7px;
  color: #CBA135;
  text-transform: uppercase;
  margin-bottom: 28px;
}
h1 {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 72px;
  line-height: 1.07;
  color: #F5F5F5;
  text-transform: uppercase;
  max-width: 920px;
}
.handle {
  font-family: 'Inter', sans-serif;
  font-size: 20px;
  font-weight: 400;
  color: rgba(245,245,245,0.45);
  margin-top: 32px;
  letter-spacing: 1px;
}
.progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  width: 154px;
  background: #ffffff;
}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="tag">Coca vs Pepsi</div>
    <h1>A Pepsi tinha o melhor produto. E perdeu mesmo assim.</h1>
    <div class="handle">@omatheusfariaa</div>
  </div>
  <div class="progress"></div>
</body>
</html>
